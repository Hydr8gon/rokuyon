name: Automatic Builds

on:
  push:
    branches:
    - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Install Flatpak and SDK
      run: |
        sudo apt update
        sudo apt install flatpak flatpak-builder -y
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08 -y
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        git config --global protocol.file.allow always
        make flatpak -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rokuyon-linux
        path: rokuyon.flatpak

  build-mac:
    runs-on: macos-latest
    steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixpkgs-25.05-darwin
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build wxWidgets
      run: |
        git clone --recursive https://github.com/wxWidgets/wxWidgets.git --branch v3.3.2
        cd wxWidgets
        ./configure --disable-sys-libs --disable-shared --disable-tests --without-libcurl
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install
    - name: Compile
      shell: 'nix-shell -p portaudio libGL pkg-config --run "bash {0}"'
      run: make -j$(sysctl -n hw.logicalcpu)
    - name: Bundle
      run: ./mac-bundle.sh --dmg
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rokuyon-mac
        path: rokuyon.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
    - name: Install tools and dependencies
      run: pacman -S mingw-w64-ucrt-x86_64-{gcc,pkg-config,wxwidgets3.3-msw,portaudio,jbigkit} make --noconfirm
      shell: msys2 {0}
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        make -j$(nproc)
        strip rokuyon.exe
      shell: msys2 {0}
      working-directory: ${{ github.workspace }}
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rokuyon-windows
        path: rokuyon.exe

  build-switch:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: make switch -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rokuyon-switch
        path: rokuyon.nro

  update-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows, build-switch]
    steps:
    - name: Delete old release
      uses: dev-drprasad/delete-tag-and-release@v0.2.1
      with:
        delete_release: true
        tag_name: release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Get artifacts
      uses: actions/download-artifact@v4
    - name: Package artifacts
      run: for i in ./*; do zip -r -j ${i}.zip $i; done
    - name: Create new release
      uses: ncipollo/release-action@v1
      with:
        name: Rolling Release
        body: These are automatically updated builds of the latest commit.
        artifacts: "*.zip"
        makeLatest: true
        tag: release
        token: ${{ secrets.GITHUB_TOKEN }}
